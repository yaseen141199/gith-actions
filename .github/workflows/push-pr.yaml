on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "src/**"
      - "tests/**"
      - "package.json"
  pull:
    branches:
      - main
      - "release/**"
    paths:
      - "src/**"
      - "tests/**"
      - "package.json"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: run tests
        run: npm test
